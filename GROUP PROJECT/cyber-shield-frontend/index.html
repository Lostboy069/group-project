<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cyber Shield</title>
    <link rel="icon" type="image/png" href="icongg.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo"><span class="bracket">[</span>CYBER_SHIELD_AI<span class="bracket">]</span></div>
            <p class="subtitle">AI-driven scanning for links, files, and messages<span class="accent"> &mdash; in real time</span></p>

            <div class="status-bar">
                <span class="item"><span class="led"></span> Detection: Active</span>
                <span class="item"><span class="led"></span> AI Model: Loaded</span>
                <span class="item"><span class="led"></span> Reports: Ready</span>
            </div>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="link"><span class="idx">01</span>Link Scanner</button>
            <button class="tab-btn" data-tab="file"><span class="idx">02</span>File Analyzer</button>
            <button class="tab-btn" data-tab="message"><span class="idx">03</span>Message AI</button>
        </nav>

        <main>
            <div class="tab-content active" id="link-tab">
                <form id="link-form" class="glass-card">
                    <div class="field-label">Target URL</div>
                    <input type="url" name="url" id="link-input" placeholder="https://suspicious-link.example" required>
                    <button type="submit">Scan Link</button>
                </form>
            </div>

            <div class="tab-content" id="file-tab">
                <form id="file-form" class="glass-card">
                    <div class="field-label">Upload Target</div>
                    <div class="file-drop-zone" id="drop-zone">
                        <span class="icon">&#9660;</span>
                        <span>Drag &amp; drop a file, or click to browse</span>
                        <input type="file" name="file" id="file-input" hidden>
                    </div>
                    <button type="submit">Analyze File</button>
                </form>
            </div>

            <div class="tab-content" id="message-tab">
                <form id="message-form" class="glass-card">
                    <div class="field-label">Message Content</div>
                    <textarea name="message" id="msg-input" rows="4" placeholder="Paste an email, SMS, or message to analyze for phishing and scam patterns..." required></textarea>
                    <button type="submit">Run AI Detection</button>
                </form>
            </div>

            <div class="results-panel" id="results"></div>
        </main>

        <footer>AI Cyber Shield &mdash; Educational Threat Detection by SALMAN & group</footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
